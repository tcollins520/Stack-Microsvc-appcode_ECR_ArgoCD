replicaCount: 3

image:
  repository: tcollins520/retail-store-checkout
  pullPolicy: IfNotPresent
  tag: "1.3.0"

containerPort: 8080

service:
  type: ClusterIP
  port: 80
  name: checkout
  targetPort: 8080

serviceAccount:
  name: checkout

probes:
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5

  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10

resources:
  requests:
    cpu: 256m
    memory: 512Mi

  limits:
    cpu: 512m
    memory: 1Gi

# ---------------------------------------------------------
# Redis Database Endpoint
# ---------------------------------------------------------
database:
  RETAIL_CHECKOUT_PERSISTENCE_PROVIDER: redis
  RETAIL_CHECKOUT_PERSISTENCE_REDIS_URL: "redis://retail-dev-checkout-redis.rcapw5.0001.use1.cache.amazonaws.com:6379"
  RETAIL_CHECKOUT_ENDPOINTS_ORDERS: http://orders:80


autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector:
  karpenter.sh/capacity-type: on-demand

affinity: {}

tolerations: []

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: checkout
        app.kubernetes.io/component: service
        app.kubernetes.io/instance: checkout

  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: checkout
        app.kubernetes.io/component: service
        app.kubernetes.io/instance: checkout

podDisruptionBudget:
  enabled: true
  minAvailable: 2

opentelemetry:
  enabled: true
  instrumentation: default-instrumentation
  