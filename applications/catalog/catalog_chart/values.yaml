replicaCount: 3

image:
  repository: tcollins520/retail-store-catalog
  pullPolicy: IfNotPresent
  tag: "1.3.0"

containerPort: 8080

service:
  type: ClusterIP
  port: 80
  name: catalog
  targetPort: 8080

serviceAccount:
  name: catalog

probes:
  readiness:
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5

  liveness:
    path: /health
    initialDelaySeconds: 30
    periodSeconds: 10

resources:
  requests:
    cpu: 256m
    memory: 512Mi

  limits:
    cpu: 512m
    memory: 512Mi

# ---------------------------------------------------------
# MySQL RDS Database Endpoint
# ---------------------------------------------------------
database:
  endpoint: mydb3.cml0yuu2ka2y.us-east-1.rds.amazonaws.com
  port: 3306
  serviceName: catalog-mysql

secrets:
  awsRegion: us-east-1
  secretName: retailstore-db-secret-1
  secretProviderClass: catalog-db-secrets

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 12
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector:
  karpenter.sh/capacity-type: on-demand

affinity: {}

tolerations: []

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: kubernetes.io/hostname
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: catalog
        app.kubernetes.io/component: service
        app.kubernetes.io/instance: catalog

  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: DoNotSchedule
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: catalog
        app.kubernetes.io/component: service
        app.kubernetes.io/instance: catalog

podDisruptionBudget:
  enabled: true
  minAvailable: 2

opentelemetry:
  enabled: true
  instrumentation: default-instrumentation
  