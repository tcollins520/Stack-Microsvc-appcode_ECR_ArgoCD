apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass

metadata:
  name: catalog-db-secrets

spec:
  provider: aws

  parameters:
    region: {{ .Values.secrets.awsRegion }}
    usePodIdentity: "true"

    objects: |
      - objectName: "{{ .Values.secrets.secretName }}"
        objectType: "secretsmanager"
        jmesPath:
          - path: "username"
            objectAlias: "username"
          - path: "password"
            objectAlias: "password"

  secretObjects:
  - secretName: catalog-db
    type: Opaque
    data:
      - objectName: username
        key: RETAIL_CATALOG_PERSISTENCE_USER

      - objectName: password
        key: RETAIL_CATALOG_PERSISTENCE_PASSWORD